name: github pages publish

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"

      - name: Install the project
        run: uv sync --frozen --all-extras

      - name: Type check
        run: uv run mypy main.py

      - name: Run tests
        run: uv run pytest

      - name: Run main.py
        run: uv run main.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: feeds

  publish:
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  notify-failure:
    needs: [build, publish]
    if: failure() && github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Open or update tracking issue on failure
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RUN_ID: ${{ github.run_id }}
          ISSUE_TITLE: "gh-pages scheduled run is failing"
          ISSUE_LABEL: ci-failure
        run: |
          set -euo pipefail
          existing="$(gh issue list --state open --label "$ISSUE_LABEL" --search "$ISSUE_TITLE in:title" --json number --jq '.[0].number // empty')"
          body="Scheduled run failed. See [run #${RUN_ID}](${RUN_URL})."
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "$body"
          else
            gh label create "$ISSUE_LABEL" --color B60205 --description "CI pipeline failure" 2>/dev/null || true
            gh issue create --title "$ISSUE_TITLE" --label "$ISSUE_LABEL" --body "$body"
          fi
